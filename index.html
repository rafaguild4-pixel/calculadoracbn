<script>
    const WEBHOOK_URL = "https://discord.com/api/webhooks/1483251469405655293/mIoxDI4HNiu6MLMzBF_oJtSOm_mjffvi3dlaLGvrR4vuv1WvckZdJ9-flkYt7lYUcowo"; 

    function checkLogin() {
        const fragment = new URLSearchParams(window.location.hash.slice(1));
        const token = fragment.get('access_token');
        if (token) {
            fetch('https://discord.com/api/users/@me', { headers: { authorization: `Bearer ${token}` } })
            .then(res => res.json())
            .then(user => {
                document.getElementById('login-screen').style.display = 'none';
                document.getElementById('main-app').style.display = 'flex';
                document.getElementById('user-bar').style.display = 'flex';
                document.getElementById('user-name').innerText = user.username;
                document.getElementById('user-avatar').src = `https://cdn.discordapp.com/avatars/${user.id}/${user.avatar}.png`;
                
                window.discordUser = user; 
                atualizarDataHora();

                document.querySelectorAll('input, textarea, select').forEach(el => {
                    el.addEventListener('change', calcular);
                    el.addEventListener('keyup', calcular);
                });
                document.querySelectorAll('.crime-check, .atenuante-check').forEach(el => {
                    el.addEventListener('change', calcular);
                });
                
                // Força o cálculo inicial por causa da atenuante fixa
                calcular();
            }).catch(() => logout());
        }
    }

    function logout() { window.location.hash = ""; window.location.reload(); }

    function atualizarDataHora() {
        const agora = new Date();
        document.getElementById('inData').value = agora.toLocaleDateString('pt-BR');
        document.getElementById('inHora').value = agora.toLocaleTimeString('pt-BR', {hour: '2-digit', minute:'2-digit'});
    }

    function toggleFianca(opcao) {
        const sim = document.getElementById('fiancaSim');
        const nao = document.getElementById('fiancaNao');
        if (opcao === 'sim' && sim.checked) nao.checked = false;
        if (opcao === 'nao' && nao.checked) sim.checked = false;
        calcular();
    }

    function filtrarCrimes() {
        const termo = document.getElementById('txtPesquisa').value.toLowerCase();
        const lista = document.getElementById('listaParaFiltrar');
        const labels = lista.getElementsByTagName('label');
        for (let label of labels) {
            const texto = label.innerText.toLowerCase();
            label.style.display = texto.includes(termo) ? "flex" : "none";
        }
    }

    function calcular() {
        let penaBase = 0, multa = 0, fianca = 0, inafiancavel = false;
        let crimesSelecionados = [];
        let atenuantesSelecionadas = [];

        document.querySelectorAll('.crime-check:checked').forEach(c => {
            penaBase += parseInt(c.dataset.pena);
            multa += parseInt(c.dataset.multa);
            crimesSelecionados.push(c.value);
            let f = parseInt(c.dataset.fianca);
            if (f === 0) inafiancavel = true; 
            else if (f > 0) fianca += f;
        });

        let totalDesconto = 0;
        // Captura todas as atenuantes, inclusive a 'disabled'
        document.querySelectorAll('.atenuante-check:checked').forEach(a => {
            totalDesconto += parseInt(a.dataset.descVal);
            atenuantesSelecionadas.push(a.value);
        });

        if (totalDesconto > 90) totalDesconto = 90; 
        let penaFinal = Math.ceil(penaBase * (1 - totalDesconto / 100));

        document.getElementById('resPena').innerText = penaBase + " meses";
        document.getElementById('resMulta').innerText = "R$ " + multa.toLocaleString('pt-BR');
        const fiancaTxt = inafiancavel ? "INAFIANÇÁVEL" : "R$ " + fianca.toLocaleString('pt-BR');
        document.getElementById('resFianca').innerText = fiancaTxt;
        document.getElementById('resPenaFinal').innerText = penaFinal + " meses";

        document.getElementById('listaCrimes').innerHTML = crimesSelecionados.map(c => `<span class="tag">${c}</span>`).join('') || "Nenhum crime selecionado.";
        document.getElementById('listaAtenuantes').innerHTML = atenuantesSelecionadas.map(a => `<span class="tag tag-atenuante">${a}</span>`).join('') || "Nenhuma atenuante.";
    }

    function validarEProcessar(acao) {
        const nome = document.getElementById('inNome').value;
        const pass = document.getElementById('inPass').value;
        const crimes = document.querySelectorAll('.crime-check:checked').length;

        if (!nome || !pass || crimes === 0) {
            alert("Preencha Nome, ID do acusado e selecione pelo menos um crime!");
            return;
        }

        const oficial = document.getElementById('user-name').innerText;
        const idPolicial = document.getElementById('idPolicial').value;
        const unidade = document.getElementById('inUnidade').value;
        const data = document.getElementById('inData').value;
        const hora = document.getElementById('inHora').value;
        const advogado = document.getElementById('inAdvogado').value;
        const idAdvogado = document.getElementById('idAdvogado').value;
        const relatorio = document.getElementById('inRelatorio').value || "000";
        
        const crimesLista = Array.from(document.querySelectorAll('.crime-check:checked')).map(c => c.value).join(', ');
        const atenuantesLista = Array.from(document.querySelectorAll('.atenuante-check:checked')).map(a => a.value).join(', ');
        const penaFinal = document.getElementById('resPenaFinal').innerText;
        const multaFinal = document.getElementById('resMulta').innerText;
        const fiancaFinal = document.getElementById('resFianca').innerText;
        const fiancaStatus = document.getElementById('fiancaSim').checked ? "SIM" : "NÃO";

        const textoFinal = `📌 **FICHA CRIMINAL - CBN**

👮 **OFICIAL:** ${oficial} (ID: ${idPolicial})
🏢 **UNIDADE:** ${unidade}
📅 **DATA:** ${data} às ${hora}

👤 **ACUSADO:** ${nome} (ID: ${pass})
⚖️ **ADVOGADO:** ${advogado} (ID: ${idAdvogado})

📁 **ARTIGOS:** ${crimesLista}
📉 **ATENUANTES:** ${atenuantesLista}

⏱️ **PENA FINAL:** ${penaFinal}
💰 **MULTA:** ${multaFinal}
🔒 **FIANÇA:** ${fiancaFinal} (Paga: ${fiancaStatus})

📝 **RELATÓRIO:**
${relatorio}`;

        if (acao === 'copiar') {
            navigator.clipboard.writeText(textoFinal).then(() => alert("Copiado com sucesso!"));
        } else {
            fetch(WEBHOOK_URL, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ content: textoFinal })
            }).then(() => alert("Enviado com sucesso!")).catch(() => alert("Erro ao enviar."));
        }
    }
</script>
</body>
</html>
